[pytest]
# algokit `populate_app_call_resources` distributes inner-call refs
# greedily — heavy MatchOrders × adapter paths flake ~10-20% on
# unlucky distributions but pass cleanly in isolation. Up-to-3
# reruns absorbs the noise without masking real regressions (a real
# regression fails 4× in a row, not 1×).
addopts = --reruns 3 --reruns-delay 1
testpaths = test
